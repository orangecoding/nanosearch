name: Create and publish Docker image

on:
  push:
    branches:
      - master
    tags:
      - '*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container with docker compose
        run: |
          mkdir -p ./data && chmod 777 ./data
          docker compose up --build -d
          echo "Waiting for container to be ready..."
          sleep 30

          SECONDS_ELAPSED=0
          while [ $SECONDS_ELAPSED -lt 30 ]; do
            STATUS=$(docker inspect --format='{{.State.Status}}' nanosearch 2>/dev/null || echo "not_found")
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' nanosearch 2>/dev/null || echo "none")
            echo "[$SECONDS_ELAPSED/30s] Container: $STATUS, Health: $HEALTH"
            if [ "$STATUS" != "running" ]; then
              docker compose logs nanosearch
              exit 1
            fi
            sleep 5
            SECONDS_ELAPSED=$((SECONDS_ELAPSED + 5))
          done

          docker compose down
